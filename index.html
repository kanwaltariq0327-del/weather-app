<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Weather App</title>
</head>
<body>
    <div class="card">

        <video src="./Assets/cloudy.mp4" muted loop autoplay></video>

        <div class="search">
            <input type="text" placeholder="Enter City Name">
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div class="weather">

            <h2 class="city"><span class="icon"><i class="fa-solid fa-location-dot"></i></span></h2>
            <h1 class="temp">38<span>°C│°F</span></h1>
            <div class="details">
                <div class="col">
                    <img src="./Assets/precipitation.png">
                    <div>
                        <p class="condition">Clouds</p>
                    </div>
                </div>
                <div class="col">
                    <img src="./Assets/humidity.png">
                    <div>
                        <p class="humidity">54%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="./Assets/wind.png">
                    <div>
                        <p class="wind">14 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>

        </div>

    </div>


    <script src="app.js"></script>
</body>
</html>
